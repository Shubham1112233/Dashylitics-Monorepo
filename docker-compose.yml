services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: dashlytics
      POSTGRES_PASSWORD: dashlytics
      POSTGRES_DB: dashlytics
    volumes:
      - dashlytics_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U dashlytics -d dashlytics']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  dashlytics_pgdata: